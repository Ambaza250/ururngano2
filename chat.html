<!DOCTYPE html>
<html lang="rw">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Urungano Chat</title>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import {
      getAuth,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      onAuthStateChanged,
      signOut,
      updateProfile
    } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
    import {
      getFirestore,
      collection,
      addDoc,
      onSnapshot,
      query,
      orderBy,
      doc,
      setDoc,
      getDocs,
      getDoc,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-storage.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDy9ZCOQQIMnq6GOOnSS3Hk3IMSk06jTf4",
      authDomain: "urungano-chat-50d62.firebaseapp.com",
      projectId: "urungano-chat-50d62",
      storageBucket: "urungano-chat-50d62.firebasestorage.app",
      messagingSenderId: "730372170670",
      appId: "1:730372170670:web:91300da03f18f488afde3f"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);

    let currentUser = null;
    let currentUserProfile = null;
    let currentTarget = null;
    let unsubscribeMessages = null;
    let isEnglish = false;
    const userCache = {};

    let mediaRecorder;
    let audioChunks = [];
    let isRecording = false;

    function t(rw, en) {
      return isEnglish ? en : rw;
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text ?? "";
      return div.innerHTML;
    }

    function showSection(section) {
      document.getElementById("auth-section").style.display = section === "auth" ? "flex" : "none";
      document.getElementById("chat-section").style.display = section === "chat" ? "flex" : "none";
    }

    async function saveUserProfile(user, username = "") {
      const finalUsername = username || user.displayName || user.email?.split("@")[0] || "User";

      await setDoc(doc(db, "users", user.uid), {
        uid: user.uid,
        email: user.email || "",
        username: finalUsername,
        createdAt: serverTimestamp()
      }, { merge: true });

      currentUserProfile = { uid: user.uid, email: user.email || "", username: finalUsername };
      userCache[user.uid] = currentUserProfile;
    }

    async function loadCurrentUserProfile(user) {
      const ref = doc(db, "users", user.uid);
      const snap = await getDoc(ref);
      if (snap.exists()) {
        currentUserProfile = snap.data();
        userCache[user.uid] = currentUserProfile;
      } else {
        await saveUserProfile(user);
      }
    }

    // ================== AUTH FUNCTIONS (unchanged) ==================
    window.signUp = async () => { /* ... same as before ... */ };
    window.logIn = async () => { /* ... same as before ... */ };

    async function loadGroups() { /* ... same as before ... */ }

    async function loadUsers() {
      const list = document.getElementById("users-list");
      list.innerHTML = `<p>${t("Tegereza...", "Loading...")}</p>`;

      const snapshot = await getDocs(collection(db, "users"));
      list.innerHTML = "";

      const users = [];
      snapshot.forEach(docSnap => {
        const data = docSnap.data();
        if (!data || !data.uid || data.uid === currentUser.uid) return;
        userCache[data.uid] = data;
        users.push(data);
      });

      users.sort((a, b) => (a.username || "").localeCompare(b.username || ""));

      if (!users.length) {
        list.innerHTML = `<p style="color:#64748b;">${t("Nta bandi bakoresha babonetse.", "No other users found.")}</p>`;
        return;
      }

      users.forEach(user => {
        const div = document.createElement("div");
        div.className = "user-item sidebar-item";
        div.dataset.type = "user";
        div.dataset.id = user.uid;
        div.innerHTML = `
          <strong>${escapeHtml(user.username || "User")}</strong>
          <!-- Email removed as requested -->
        `;
        div.onclick = () => openPrivateChat(user);
        list.appendChild(div);
      });
    }

    // ... (markActiveItem, clearMessages, openGroup, openPrivateChat remain the same)

    function renderMessages(snapshot) {
      const div = document.getElementById("messages");
      div.innerHTML = "";

      snapshot.forEach(d => {
        const msg = d.data();
        const time = msg.createdAt ? new Date(msg.createdAt.toDate()).toLocaleTimeString(isEnglish ? "en-US" : "rw-RW", {
          hour: "2-digit", minute: "2-digit"
        }) : "";

        const senderName = userCache[msg.senderId]?.username || msg.senderName || "User";

        const mdiv = document.createElement("div");
        mdiv.className = `message ${msg.senderId === currentUser.uid ? "sent" : "received"}`;

        let content = '';
        if (msg.audioUrl) {
          content = `<audio controls src="${msg.audioUrl}" style="width:100%; max-width:280px;"></audio>`;
        } else {
          content = `<div>${escapeHtml(msg.text)}</div>`;
        }

        mdiv.innerHTML = `
          ${msg.senderId === currentUser.uid ? "" : `<span class="sender-name">${escapeHtml(senderName)}</span>`}
          ${content}
          <small>${escapeHtml(time)}</small>
        `;
        div.appendChild(mdiv);
      });

      div.scrollTop = div.scrollHeight;
    }

    window.sendMessage = async () => {
      const input = document.getElementById("message-input");
      const text = input.value.trim();
      if (!text || !currentUser || !currentTarget) return;

      const senderName = currentUserProfile?.username || currentUser.displayName || "User";

      const messageData = {
        text,
        senderId: currentUser.uid,
        senderName,
        createdAt: serverTimestamp()
      };

      if (currentTarget.type === "group") {
        await addDoc(collection(db, "groups", currentTarget.data.id, "messages"), messageData);
      } else if (currentTarget.type === "private") {
        const chatId = [currentUser.uid, currentTarget.data.uid].sort().join("_");
        await addDoc(collection(db, "chats", chatId, "messages"), messageData);
      }

      input.value = "";
    };

    // ================== VOICE NOTE FUNCTIONS ==================
    window.startRecording = async () => {
      if (isRecording) return;
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];

        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.onstop = async () => {
          const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
          await uploadVoiceNote(audioBlob);
        };

        mediaRecorder.start();
        isRecording = true;
        document.getElementById("voice-btn").style.background = "#ef4444";
        document.getElementById("voice-btn").textContent = "⏹️";
      } catch (err) {
        alert("Ntibishoboye gufungura microphone: " + err.message);
      }
    };

    window.stopRecording = () => {
      if (mediaRecorder && isRecording) {
        mediaRecorder.stop();
        isRecording = false;
        document.getElementById("voice-btn").style.background = "#10b981";
        document.getElementById("voice-btn").textContent = "🎤";
      }
    };

    async function uploadVoiceNote(audioBlob) {
      if (!currentTarget) return;

      const fileName = `voice_${Date.now()}.webm`;
      const storageRef = ref(storage, `voice_notes/${currentUser.uid}/${fileName}`);

      try {
        await uploadBytes(storageRef, audioBlob);
        const downloadURL = await getDownloadURL(storageRef);

        const senderName = currentUserProfile?.username || currentUser.displayName || "User";
        const messageData = {
          audioUrl: downloadURL,
          senderId: currentUser.uid,
          senderName,
          createdAt: serverTimestamp()
        };

        if (currentTarget.type === "group") {
          await addDoc(collection(db, "groups", currentTarget.data.id, "messages"), messageData);
        } else if (currentTarget.type === "private") {
          const chatId = [currentUser.uid, currentTarget.data.uid].sort().join("_");
          await addDoc(collection(db, "chats", chatId, "messages"), messageData);
        }
      } catch (err) {
        console.error(err);
        alert("Failed to send voice note");
      }
    }

    window.logout = () => signOut(auth);

    // ... rest of your functions (refreshLanguage, onAuthStateChanged, etc.) remain the same
    // Just make sure you call loadUsers() and loadGroups() as before
  </script>

  <style>
    /* ... (all your previous CSS) ... */
  </style>
</head>
<body>
  <div class="container">
    <!-- Auth section same as before -->

    <div id="chat-section" style="display:none;">
      <!-- Sidebar same -->

      <div class="chat-area">
        <div class="chat-header" id="chat-header">...</div>
        
        <div id="messages"></div>

        <div class="input-area">
          <input id="message-input" type="text" placeholder="Andika message hano...">
          <button onclick="sendMessage()" id="send-btn">Ohereza</button>
          
          <!-- Voice Note Button -->
          <button id="voice-btn" 
                  onclick="if(isRecording) stopRecording(); else startRecording();"
                  style="background:#10b981; width:52px; height:52px; border-radius:50%; font-size:24px;">
            🎤
          </button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
