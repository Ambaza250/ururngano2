<!DOCTYPE html>
<html lang="rw">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Urungano Chat - Debug</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #f4f4f4; }
    .container { max-width: 700px; margin: 40px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    input { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; }
    button { padding: 14px 24px; margin: 8px 5px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
    .signup { background: #28a745; color: white; }
    .login { background: #007bff; color: white; }
    #status { margin-top: 20px; padding: 15px; border-radius: 8px; font-weight: bold; min-height: 80px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🗣️ Urungano Chat - Debug Mode</h1>
    
    <h3>Iyandikishe cyangwa Kwinjira</h3>
    
    <input id="email" type="email" placeholder="Email yawe" value="ambazasem63@gmail.com">
    <input id="password" type="password" placeholder="Password yawe (nibura ibimenyetso 6)">
    
    <div>
      <button onclick="signUp()" class="signup">Iyandikishe (Sign Up)</button>
      <button onclick="logIn()" class="login">Kwinjira (Login)</button>
    </div>
    
    <div id="status">Loading...</div>
  </div>

  <script>
    const SUPABASE_URL = 'https://ydutxsguqrvgtqtjzbjv.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_LbnCj2nM89a_JQ2eavJJ9A_G6dof_ks';  // ← Using exactly what you gave

    let supabase = null;
    const statusEl = document.getElementById('status');

    // Debug info on load
    function init() {
      let debugText = "🔍 DEBUG INFO:\n\n";
      debugText += "URL: " + SUPABASE_URL + "\n";
      debugText += "Key length: " + SUPABASE_ANON_KEY.length + " characters\n";
      debugText += "Key starts with: " + SUPABASE_ANON_KEY.substring(0, 40) + "...\n\n";

      try {
        supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        debugText += "✅ Supabase.createClient() called without crash\n";
        statusEl.style.background = "#e8f5e9";
        statusEl.textContent = debugText + "\nReady. Try clicking the buttons now.";
      } catch (err) {
        debugText += "❌ ERROR creating client: " + err.message;
        statusEl.style.background = "#ffebee";
        statusEl.textContent = debugText;
      }
    }

    window.onload = init;

    // ====================== SIGN UP ======================
    async function signUp() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();

      if (!supabase) {
        statusEl.textContent = "❌ Supabase client not initialized. Check debug info above.";
        return;
      }

      statusEl.textContent = "Tegereza... Sign up igikomeje...";

      try {
        const { data, error } = await supabase.auth.signUp({ email, password });
        if (error) {
          statusEl.textContent = "❌ Sign Up Error: " + error.message;
        } else {
          statusEl.textContent = "✅ Sign Up successful! Check your email for confirmation link.";
        }
      } catch (err) {
        statusEl.textContent = "❌ Unexpected error: " + err.message;
      }
    }

    // ====================== LOGIN ======================
    async function logIn() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();

      if (!supabase) {
        statusEl.textContent = "❌ Supabase client not initialized.";
        return;
      }

      statusEl.textContent = "Tegereza... Login igikomeje...";

      try {
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) {
          statusEl.textContent = "❌ Login Error: " + error.message;
        } else {
          statusEl.textContent = "✅ Login successful! Welcome " + email;
        }
      } catch (err) {
        statusEl.textContent = "❌ Unexpected error: " + err.message;
      }
    }
  </script>
</body>
</html>
