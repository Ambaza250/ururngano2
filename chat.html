<!DOCTYPE html>
<html lang="rw">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Urungano Chat - TEST</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #f4f4f4; }
    .container { max-width: 600px; margin: 40px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
    button { padding: 15px 30px; margin: 10px; font-size: 18px; border: none; border-radius: 8px; cursor: pointer; }
    .signup { background: #28a745; color: white; }
    .login { background: #007bff; color: white; }
    #status { margin-top: 20px; padding: 15px; font-size: 18px; font-weight: bold; min-height: 60px; background: #f0f0f0; border-radius: 8px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🗣️ Urungano Chat - BUTTON TEST</h1>
    <p>If you see this message, the page loaded correctly.</p>
    
    <h3>Click the buttons → you should see a message below</h3>
    
    <button onclick="signUp()" class="signup">Iyandikishe (Sign Up)</button>
    <button onclick="logIn()" class="login">Kwinjira (Login)</button>
    
    <div id="status"></div>
  </div>

  <script>
    // These functions are defined FIRST - no Supabase yet
    function signUp() {
      document.getElementById('status').innerHTML = 
        '✅ <span style="color:green">SIGN UP BUTTON WORKS!</span><br>You clicked Iyandikishe';
      console.log('signUp() was called successfully');
    }

    function logIn() {
      document.getElementById('status').innerHTML = 
        '✅ <span style="color:blue">LOGIN BUTTON WORKS!</span><br>You clicked Kwinjira';
      console.log('logIn() was called successfully');
    }

    // Just to show the script is running
    console.log('✅ JavaScript loaded successfully');
  </script>
</body>
</html>
