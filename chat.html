<!DOCTYPE html>
<html lang="rw">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Urungano Chat</title>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, where, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDy9ZCOQQIMnq6GOOnSS3Hk3IMSk06jTf4",
      authDomain: "urungano-chat-50d62.firebaseapp.com",
      projectId: "urungano-chat-50d62",
      storageBucket: "urungano-chat-50d62.firebasestorage.app",
      messagingSenderId: "730372170670",
      appId: "1:730372170670:web:91300da03f18f488afde3f"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;
    let currentChatUser = null;
    let unsubscribeMessages = null;

    function showSection(section) {
      document.getElementById('auth-section').style.display = section === 'auth' ? 'block' : 'none';
      document.getElementById('chat-section').style.display = section === 'chat' ? 'flex' : 'none';
    }

    // ====================== AUTH ======================
    window.signUp = async () => {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const status = document.getElementById('status');
      try {
        await createUserWithEmailAndPassword(auth, email, password);
      } catch (e) { status.textContent = "❌ " + e.message; }
    };

    window.logIn = async () => {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const status = document.getElementById('status');
      try {
        await signInWithEmailAndPassword(auth, email, password);
      } catch (e) { status.textContent = "❌ " + e.message; }
    };

    // ====================== REALTIME CHAT ======================
    onAuthStateChanged(auth, (user) => {
      if (user) {
        currentUser = user;
        showSection('chat');
        loadUsers();
      } else {
        showSection('auth');
      }
    });

    async function loadUsers() {
      const list = document.getElementById('users-list');
      list.innerHTML = `
        <div class="user-item" onclick="startChat({id:'demo1', email:'user1@test.com', username:'Mukama'})">Mukama</div>
        <div class="user-item" onclick="startChat({id:'demo2', email:'user2@test.com', username:'Aline'})">Aline</div>
        <div class="user-item" onclick="startChat({id:'demo3', email:'user3@test.com', username:'Jean'})">Jean</div>
      `;
    }

    window.startChat = (user) => {
      currentChatUser = user;
      document.getElementById('chat-header').textContent = `Kuganira na ${user.username}`;
      document.getElementById('messages').innerHTML = "";

      // Unsubscribe previous listener
      if (unsubscribeMessages) unsubscribeMessages();

      const chatId = [currentUser.uid, user.id].sort().join('_');

      const q = query(collection(db, "chats", chatId, "messages"), orderBy("createdAt"));

      unsubscribeMessages = onSnapshot(q, (snapshot) => {
        const messagesDiv = document.getElementById('messages');
        messagesDiv.innerHTML = "";
        snapshot.forEach(doc => {
          const msg = doc.data();
          const div = document.createElement('div');
          div.className = `message ${msg.senderId === currentUser.uid ? 'sent' : 'received'}`;
          div.textContent = msg.text;
          messagesDiv.appendChild(div);
        });
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
      });
    };

    window.sendMessage = async () => {
      const input = document.getElementById('message-input');
      const text = input.value.trim();
      if (!text || !currentChatUser) return;

      const chatId = [currentUser.uid, currentChatUser.id].sort().join('_');

      try {
        await addDoc(collection(db, "chats", chatId, "messages"), {
          text: text,
          senderId: currentUser.uid,
          senderEmail: currentUser.email,
          createdAt: serverTimestamp()
        });
        input.value = "";
      } catch (e) {
        console.error(e);
      }
    };

    window.logout = () => signOut(auth);
  </script>

  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 10px; }
    .container { max-width: 900px; margin: auto; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; height: 95vh; display: flex; flex-direction: column; }
    .header { background: #007bff; color: white; padding: 15px; text-align: center; }
    
    #auth-section { padding: 40px; text-align: center; }
    #chat-section { display: none; flex: 1; }
    
    .sidebar { width: 280px; border-right: 1px solid #ddd; padding: 15px; overflow-y: auto; background: #f8f9fa; }
    .chat-area { flex: 1; display: flex; flex-direction: column; }
    
    .user-item { padding: 14px; margin: 6px 0; background: white; border-radius: 8px; cursor: pointer; border: 1px solid #eee; }
    .user-item:hover { background: #e3f2fd; }

    #messages { flex: 1; padding: 20px; overflow-y: auto; background: #f9f9f9; }
    .message { margin: 10px 0; padding: 12px 16px; border-radius: 18px; max-width: 75%; word-wrap: break-word; }
    .sent { background: #007bff; color: white; margin-left: auto; border-bottom-right-radius: 4px; }
    .received { background: #e9ecef; color: #333; margin-right: auto; border-bottom-left-radius: 4px; }
    
    .input-area { padding: 15px; border-top: 1px solid #ddd; display: flex; gap: 10px; }
    input { flex: 1; padding: 14px; border: 1px solid #ccc; border-radius: 25px; }
    button { padding: 14px 24px; background: #007bff; color: white; border: none; border-radius: 25px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="container">
    <!-- AUTH -->
    <div id="auth-section">
      <h1>🗣️ Urungano Chat</h1>
      <p>Kuganira mu bwiherezo</p>
      <input id="email" type="email" placeholder="Email yawe" value="ambazasem63@gmail.com"><br><br>
      <input id="password" type="password" placeholder="Password"><br><br>
      <button onclick="signUp()" style="background:#28a745;color:white;padding:12px 30px;margin:5px;">Iyandikishe</button>
      <button onclick="logIn()" style="background:#007bff;color:white;padding:12px 30px;margin:5px;">Kwinjira</button>
      <div id="status" style="margin-top:20px; font-weight:bold;"></div>
    </div>

    <!-- CHAT -->
    <div id="chat-section" style="display:none; flex:1; flex-direction:column;">
      <div style="display:flex; flex:1;">
        <div class="sidebar">
          <h3>Abandi bakoresha</h3>
          <div id="users-list"></div>
          <br><br>
          <button onclick="logout()" style="width:100%; padding:12px; background:#dc3545; color:white; border:none; border-radius:8px;">Sohoka</button>
        </div>

        <div class="chat-area">
          <div class="header" id="chat-header" style="background:#28a745;">Hitamo umuntu ukaganire na we</div>
          <div id="messages"></div>
          <div class="input-area">
            <input id="message-input" placeholder="Andika message..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">Ohereza</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
