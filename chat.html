<!DOCTYPE html>
<html lang="rw">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Urungano Chat</title>
  <script type="module">
    // ================== IMPORT FIREBASE ==================
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
    import { getFirestore } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

    // ================== YOUR FIREBASE CONFIG ==================
    const firebaseConfig = {
      apiKey: "AIzaSyDy9ZCOQQIMnq6GOOnSS3Hk3IMSk06jTf4",
      authDomain: "urungano-chat-50d62.firebaseapp.com",
      projectId: "urungano-chat-50d62",
      storageBucket: "urungano-chat-50d62.firebasestorage.app",
      messagingSenderId: "730372170670",
      appId: "1:730372170670:web:91300da03f18f488afde3f",
      measurementId: "G-T4S2T4BCKG"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // ====================== SIGN UP ======================
    window.signUp = async function() {
      const statusEl = document.getElementById('status');
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();

      if (!email || !password || password.length < 6) {
        statusEl.textContent = "❌ Andika email n'ijambo ry'ibanga rirenze ibimenyetso 6";
        statusEl.style.background = "#ffebee";
        return;
      }

      statusEl.textContent = "Tegereza... Iyandikishwa rigikomeje...";
      statusEl.style.background = "#fff3e0";

      try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        statusEl.textContent = "✅ Iyandikishwa ryagenze neza! Murakaza neza " + email;
        statusEl.style.background = "#e8f5e9";
        console.log("User created:", userCredential.user);
      } catch (error) {
        statusEl.textContent = "❌ Ikosa: " + error.message;
        statusEl.style.background = "#ffebee";
      }
    };

    // ====================== LOGIN ======================
    window.logIn = async function() {
      const statusEl = document.getElementById('status');
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();

      if (!email || !password) {
        statusEl.textContent = "❌ Andika email n'ijambo ry'ibanga";
        statusEl.style.background = "#ffebee";
        return;
      }

      statusEl.textContent = "Tegereza... Kwinjira bigikomeje...";
      statusEl.style.background = "#fff3e0";

      try {
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        statusEl.textContent = "✅ Murakaza neza! Watsinze kwinjira 🎉";
        statusEl.style.background = "#e8f5e9";
        console.log("Logged in user:", userCredential.user);
      } catch (error) {
        statusEl.textContent = "❌ Ikosa: " + error.message;
        statusEl.style.background = "#ffebee";
      }
    };
  </script>

  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #f4f4f4; margin: 0; }
    .container { max-width: 600px; margin: 40px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    input { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
    button { padding: 14px 24px; margin: 8px 5px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
    .signup { background: #28a745; color: white; }
    .login { background: #007bff; color: white; }
    #status { margin-top: 20px; padding: 15px; border-radius: 8px; font-weight: bold; min-height: 70px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🗣️ Urungano Chat</h1>
    <p>Kuganira mu bwiherezo ku buzima bwo mu mutwe n'ubuzima bw'imyororokere</p>
    
    <h3>Iyandikishe cyangwa Kwinjira</h3>
    
    <input id="email" type="email" placeholder="Email yawe" value="ambazasem63@gmail.com">
    <input id="password" type="password" placeholder="Password yawe (nibura ibimenyetso 6)">
    
    <div>
      <button onclick="signUp()" class="signup">Iyandikishe (Sign Up)</button>
      <button onclick="logIn()" class="login">Kwinjira (Login)</button>
    </div>
    
    <div id="status">Ready...</div>
  </div>
</body>
</html>
