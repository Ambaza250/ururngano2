<!DOCTYPE html>
<html lang="rw">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Urungano Chat - Kuganira mu bwiherezo</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="style.css"> <!-- your existing CSS -->
  <style>
    /* Quick chat styles - you can move to style.css */
    #chat-window { height: 60vh; overflow-y: auto; padding: 15px; background: #f8f9fa; border-radius: 12px; }
    .message { margin-bottom: 12px; max-width: 75%; }
    .sent { background: #007bff; color: white; border-radius: 18px 18px 4px 18px; padding: 10px 15px; margin-left: auto; }
    .received { background: #e9ecef; color: #333; border-radius: 18px 18px 18px 4px; padding: 10px 15px; }
  </style>
</head>
<body>
  <div class="container mt-4">
    <h1 class="text-center">🗣️ Urungano Chat</h1>
    <p class="text-center text-muted">Kuganira mu bwiherezo ku buzima bwo mu mutwe n'ubuzima bw'imyororokere</p>

    <!-- AUTH SECTION -->
    <div id="auth-section">
      <div class="card p-4">
        <h4>Iyandikishe cyangwa Kwinjira</h4>
        <input id="email" type="email" class="form-control mb-2" placeholder="Email">
        <input id="password" type="password" class="form-control mb-3" placeholder="Password">
        <button onclick="signUp()" class="btn btn-success w-100 mb-2">Iyandikishe (Sign Up)</button>
        <button onclick="logIn()" class="btn btn-primary w-100">Kwinjira (Login)</button>
      </div>
    </div>

    <!-- MAIN CHAT APP (hidden until logged in) -->
    <div id="app-section" class="row" style="display:none">
      <!-- User list / search -->
      <div class="col-md-4">
        <h5>Abandi bakoresha</h5>
        <input id="search" placeholder="Shakisha username..." class="form-control mb-2" onkeyup="searchUsers()">
        <div id="users-list" class="list-group"></div>
      </div>

      <!-- Conversations + Chat window -->
      <div class="col-md-8">
        <div id="conversation-header" class="d-flex justify-content-between align-items-center mb-3">
          <h5 id="chat-with">Hitamo umuntu</h5>
          <button onclick="logout()" class="btn btn-sm btn-outline-danger">Sohoka</button>
        </div>

        <div id="chat-window"></div>

        <div class="input-group mt-3">
          <input id="message-input" placeholder="Andika message yawe..." class="form-control">
          <button onclick="sendMessage()" class="btn btn-primary">Ohereza</button>
        </div>
      </div>
    </div>
  </div>

  <script src="chat.js"></script>
</body>
</html>
