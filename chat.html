<!DOCTYPE html>
<html lang="rw">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Urungano Chat</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #f4f4f4; }
    .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    input { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; }
    button { padding: 14px 24px; margin: 8px 5px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
    .signup { background: #28a745; color: white; }
    .login { background: #007bff; color: white; }
    #status { margin-top: 20px; padding: 12px; border-radius: 6px; font-weight: bold; background: #f0f0f0; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🗣️ Urungano Chat</h1>
    <p>Kuganira mu bwiherezo ku buzima bwo mu mutwe n'ubuzima bw'imyororokere</p>
    
    <h3>Iyandikishe cyangwa Kwinjira</h3>
    
    <input id="email" type="email" placeholder="Email yawe" value="ambazasem63@gmail.com">
    <input id="password" type="password" placeholder="Password yawe (nibura ibimenyetso 6)">
    
    <div>
      <button onclick="signUp()" class="signup">Iyandikishe (Sign Up)</button>
      <button onclick="logIn()" class="login">Kwinjira (Login)</button>
    </div>
    
    <div id="status"></div>
  </div>

  <!-- VERY IMPORTANT: Script tag at the bottom -->
  <script src="chat.js"></script>
</body>
</html>
