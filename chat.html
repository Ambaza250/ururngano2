<!DOCTYPE html>
<html lang="rw">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Urungano Chat</title>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, where } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDy9ZCOQQIMnq6GOOnSS3Hk3IMSk06jTf4",
      authDomain: "urungano-chat-50d62.firebaseapp.com",
      projectId: "urungano-chat-50d62",
      storageBucket: "urungano-chat-50d62.firebasestorage.app",
      messagingSenderId: "730372170670",
      appId: "1:730372170670:web:91300da03f18f488afde3f"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;
    let currentChatUser = null;

    // ================== UI ELEMENTS ==================
    function showSection(section) {
      document.getElementById('auth-section').style.display = section === 'auth' ? 'block' : 'none';
      document.getElementById('chat-section').style.display = section === 'chat' ? 'flex' : 'none';
    }

    // ====================== AUTH ======================
    window.signUp = async function() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const status = document.getElementById('status');

      try {
        await createUserWithEmailAndPassword(auth, email, password);
        status.textContent = "✅ Iyandikishwa ryagenze neza!";
        status.style.background = "#e8f5e9";
      } catch (e) {
        status.textContent = "❌ " + e.message;
        status.style.background = "#ffebee";
      }
    };

    window.logIn = async function() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const status = document.getElementById('status');

      try {
        await signInWithEmailAndPassword(auth, email, password);
      } catch (e) {
        status.textContent = "❌ " + e.message;
        status.style.background = "#ffebee";
      }
    };

    // ====================== MAIN CHAT INTERFACE ======================
    onAuthStateChanged(auth, (user) => {
      if (user) {
        currentUser = user;
        showSection('chat');
        loadUsers();
      } else {
        currentUser = null;
        showSection('auth');
      }
    });

    async function loadUsers() {
      const usersList = document.getElementById('users-list');
      usersList.innerHTML = "<p>Tegereza...</p>";

      // For now, show a simple list (we'll improve later)
      const dummyUsers = [
        { id: "demo1", email: "user1@example.com", username: "Mukama" },
        { id: "demo2", email: "user2@example.com", username: "Aline" },
        { id: "demo3", email: "user3@example.com", username: "Jean" }
      ];

      usersList.innerHTML = "";
      dummyUsers.forEach(u => {
        if (u.email === currentUser.email) return;
        const div = document.createElement('div');
        div.className = "user-item";
        div.textContent = u.username || u.email;
        div.onclick = () => startChat(u);
        usersList.appendChild(div);
      });
    }

    function startChat(user) {
      currentChatUser = user;
      document.getElementById('chat-header').textContent = `Kuganira na ${user.username || user.email}`;
      document.getElementById('messages').innerHTML = "";
      loadMessages();
    }

    async function loadMessages() {
      // This is placeholder for now - we'll make it real in next step
      const messagesDiv = document.getElementById('messages');
      messagesDiv.innerHTML = `<p style="text-align:center; color:#666;">💬 Chat with ${currentChatUser.username} started.<br>Real-time messages will appear here.</p>`;
    }

    window.sendMessage = async function() {
      const input = document.getElementById('message-input');
      const text = input.value.trim();
      if (!text || !currentChatUser) return;

      const messagesDiv = document.getElementById('messages');
      const msgDiv = document.createElement('div');
      msgDiv.className = "message sent";
      msgDiv.textContent = text;
      messagesDiv.appendChild(msgDiv);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;

      input.value = "";
    };

    window.logout = () => signOut(auth);
  </script>

  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 10px; }
    .container { max-width: 900px; margin: auto; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; }
    .header { background: #007bff; color: white; padding: 15px; text-align: center; }
    
    #auth-section { padding: 30px; text-align: center; }
    #chat-section { display: none; height: 85vh; }
    
    .sidebar { width: 280px; border-right: 1px solid #ddd; padding: 15px; overflow-y: auto; }
    .chat-area { flex: 1; display: flex; flex-direction: column; }
    
    .user-item { padding: 12px; margin: 6px 0; background: #f8f9fa; border-radius: 8px; cursor: pointer; }
    .user-item:hover { background: #e3f2fd; }
    
    #messages { flex: 1; padding: 15px; overflow-y: auto; background: #f9f9f9; }
    .message { margin: 8px 0; padding: 10px 14px; border-radius: 18px; max-width: 70%; }
    .sent { background: #007bff; color: white; margin-left: auto; border-bottom-right-radius: 4px; }
    .received { background: #e9ecef; color: #333; margin-right: auto; border-bottom-left-radius: 4px; }
    
    .input-area { padding: 15px; border-top: 1px solid #ddd; display: flex; }
    input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 25px; margin-right: 10px; }
    button { padding: 12px 20px; background: #007bff; color: white; border: none; border-radius: 25px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="container">
    <!-- AUTH SECTION -->
    <div id="auth-section">
      <div class="header">
        <h1>🗣️ Urungano Chat</h1>
        <p>Kuganira mu bwiherezo</p>
      </div>
      <h3>Iyandikishe cyangwa Kwinjira</h3>
      <input id="email" type="email" placeholder="Email yawe" value="ambazasem63@gmail.com"><br><br>
      <input id="password" type="password" placeholder="Password yawe"><br><br>
      <button onclick="signUp()" class="signup" style="background:#28a745; color:white; padding:12px 30px; margin:5px;">Iyandikishe</button>
      <button onclick="logIn()" class="login" style="background:#007bff; color:white; padding:12px 30px; margin:5px;">Kwinjira</button>
      <div id="status" style="margin-top:20px; min-height:30px;"></div>
    </div>

    <!-- CHAT SECTION -->
    <div id="chat-section">
      <div style="display:flex; height:100%;">
        <!-- Sidebar - Users -->
        <div class="sidebar">
          <h3>Abandi bakoresha</h3>
          <div id="users-list"></div>
          <br>
          <button onclick="logout()" style="width:100%; padding:10px; background:#dc3545; color:white; border:none; border-radius:8px;">Sohoka</button>
        </div>

        <!-- Main Chat Area -->
        <div class="chat-area">
          <div class="header" id="chat-header" style="background:#28a745;">Hitamo umuntu ukaganire na we</div>
          <div id="messages"></div>
          <div class="input-area">
            <input id="message-input" placeholder="Andika message..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">Ohereza</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
