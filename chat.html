<!DOCTYPE html>
<html lang="rw">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Urungano Chat</title>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, setDoc, getDocs, updateDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDy9ZCOQQIMnq6GOOnSS3Hk3IMSk06jTf4",
      authDomain: "urungano-chat-50d62.firebaseapp.com",
      projectId: "urungano-chat-50d62",
      storageBucket: "urungano-chat-50d62.firebasestorage.app",
      messagingSenderId: "730372170670",
      appId: "1:730372170670:web:91300da03f18f488afde3f"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;
    let currentChatUser = null;
    let unsubscribeMessages = null;
    let typingTimeout = null;

    function showSection(section) {
      document.getElementById('auth-section').style.display = section === 'auth' ? 'block' : 'none';
      document.getElementById('chat-section').style.display = section === 'chat' ? 'flex' : 'none';
    }

    // ====================== SIGN UP WITH USERNAME ======================
    window.signUp = async () => {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const username = document.getElementById('username').value.trim();
      const status = document.getElementById('status');

      if (!username) {
        status.textContent = "❌ Shyira username";
        return;
      }

      try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        await setDoc(doc(db, "users", user.uid), {
          uid: user.uid,
          email: user.email,
          username: username,
          createdAt: serverTimestamp()
        });

        status.textContent = "✅ Iyandikishwa ryagenze neza!";
        status.style.background = "#e8f5e9";
      } catch (e) {
        status.textContent = "❌ " + e.message;
        status.style.background = "#ffebee";
      }
    };

    window.logIn = async () => {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const status = document.getElementById('status');

      try {
        await signInWithEmailAndPassword(auth, email, password);
      } catch (e) {
        status.textContent = "❌ " + e.message;
        status.style.background = "#ffebee";
      }
    };

    // ====================== LOAD USERS ======================
    async function loadUsers() {
      const list = document.getElementById('users-list');
      list.innerHTML = "<p>Tegereza...</p>";

      const snapshot = await getDocs(collection(db, "users"));
      list.innerHTML = "";

      let count = 0;
      snapshot.forEach(docSnap => {
        const data = docSnap.data();
        if (data.uid === currentUser.uid) return;

        count++;
        const div = document.createElement('div');
        div.className = "user-item";
        div.innerHTML = `<strong>${data.username || 'No name'}</strong><br><small>${data.email}</small>`;
        div.onclick = () => startChat(data);
        list.appendChild(div);
      });

      if (count === 0) {
        list.innerHTML = "<p>Nta wundi mukoresha wabonetse kugeza ubu.</p>";
      }
    }

    // ====================== START CHAT ======================
    window.startChat = (user) => {
      currentChatUser = user;
      document.getElementById('chat-header').textContent = `Kuganira na ${user.username || user.email}`;
      document.getElementById('messages').innerHTML = "";

      if (unsubscribeMessages) unsubscribeMessages();

      const chatId = [currentUser.uid, user.uid].sort().join('_');

      const q = query(collection(db, "chats", chatId, "messages"), orderBy("createdAt"));

      unsubscribeMessages = onSnapshot(q, (snapshot) => {
        const div = document.getElementById('messages');
        div.innerHTML = "";
        snapshot.forEach(d => {
          const msg = d.data();
          const time = msg.createdAt ? new Date(msg.createdAt.toDate()).toLocaleTimeString('rw-RW', {hour:'2-digit', minute:'2-digit'}) : '';

          const mdiv = document.createElement('div');
          mdiv.className = `message ${msg.senderId === currentUser.uid ? 'sent' : 'received'}`;
          mdiv.innerHTML = `${msg.text} <small style="opacity:0.7;">${time}</small>`;
          div.appendChild(mdiv);
        });
        div.scrollTop = div.scrollHeight;
      });
    };

    // ====================== SEND MESSAGE ======================
    window.sendMessage = async () => {
      const input = document.getElementById('message-input');
      const text = input.value.trim();
      if (!text || !currentChatUser) return;

      const chatId = [currentUser.uid, currentChatUser.uid].sort().join('_');

      await addDoc(collection(db, "chats", chatId, "messages"), {
        text: text,
        senderId: currentUser.uid,
        senderUsername: currentUser.username || currentUser.email,
        createdAt: serverTimestamp()
      });

      input.value = "";
    };

    // ====================== TYPING INDICATOR ======================
    window.handleTyping = () => {
      if (!currentChatUser) return;
      const chatId = [currentUser.uid, currentChatUser.uid].sort().join('_');
      // Simple typing simulation for now (can be enhanced later)
      clearTimeout(typingTimeout);
      typingTimeout = setTimeout(() => {}, 2000);
    };

    window.logout = () => signOut(auth);

    // ====================== AUTH STATE ======================
    onAuthStateChanged(auth, (user) => {
      if (user) {
        currentUser = user;
        showSection('chat');
        loadUsers();
      } else {
        showSection('auth');
      }
    });
  </script>

  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 10px; }
    .container { max-width: 900px; margin: auto; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; height: 95vh; display: flex; flex-direction: column; }
    
    #auth-section { padding: 40px; text-align: center; }
    #chat-section { display: none; flex: 1; }
    
    .sidebar { width: 320px; border-right: 1px solid #ddd; padding: 15px; overflow-y: auto; background: #f8f9fa; }
    .chat-area { flex: 1; display: flex; flex-direction: column; }
    
    .user-item { padding: 12px; margin: 6px 0; background: white; border-radius: 8px; cursor: pointer; border: 1px solid #eee; }
    .user-item:hover { background: #e3f2fd; }

    #messages { flex: 1; padding: 20px; overflow-y: auto; background: #f9f9f9; }
    .message { margin: 10px 0; padding: 12px 16px; border-radius: 18px; max-width: 75%; word-wrap: break-word; position: relative; }
    .sent { background: #007bff; color: white; margin-left: auto; border-bottom-right-radius: 4px; }
    .received { background: #e9ecef; color: #333; margin-right: auto; border-bottom-left-radius: 4px; }
    
    .input-area { padding: 15px; border-top: 1px solid #ddd; display: flex; gap: 10px; }
    input { flex: 1; padding: 14px; border: 1px solid #ccc; border-radius: 25px; }
    button { padding: 14px 24px; background: #007bff; color: white; border: none; border-radius: 25px; cursor: pointer; }

    .safety-banner {
      background: #fff3cd; color: #856404; padding: 12px; text-align: center; font-size: 14px; border-bottom: 1px solid #ffeaa7;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- AUTH SECTION -->
    <div id="auth-section">
      <h1>🗣️ Urungano Chat</h1>
      <p>Kuganira mu bwiherezo</p>
      
      <input id="username" type="text" placeholder="Username (nk' @Mukama250)" style="margin-bottom:10px;"><br>
      <input id="email" type="email" placeholder="Email yawe"><br><br>
      <input id="password" type="password" placeholder="Password"><br><br>
      
      <button onclick="signUp()" style="background:#28a745;color:white;padding:12px 30px;margin:5px;">Iyandikishe</button>
      <button onclick="logIn()" style="background:#007bff;color:white;padding:12px 30px;margin:5px;">Kwinjira</button>
      <div id="status" style="margin-top:20px; font-weight:bold; min-height:40px;"></div>
    </div>

    <!-- CHAT SECTION -->
    <div id="chat-section" style="display:none; flex:1; flex-direction:column;">
      <div class="safety-banner">
        ⚠️ Iyi chat ntabwo ari inama y'ubuzima cyangwa ubujyanama. Ni umwanya wo kuganira gusa. Koresha neza.
      </div>
      
      <div style="display:flex; flex:1;">
        <div class="sidebar">
          <h3>Abandi bakoresha</h3>
          <div id="users-list"></div>
          <br><br>
          <button onclick="logout()" style="width:100%; padding:12px; background:#dc3545; color:white; border:none; border-radius:8px;">Sohoka</button>
        </div>

        <div class="chat-area">
          <div class="header" id="chat-header" style="background:#28a745;">Hitamo umuntu ukaganire na we</div>
          <div id="messages"></div>
          <div class="input-area">
            <input id="message-input" placeholder="Andika message..." onkeypress="if(event.key==='Enter') sendMessage()" onkeyup="handleTyping()">
            <button onclick="sendMessage()">Ohereza</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
