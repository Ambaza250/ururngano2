<!DOCTYPE html>
<html lang="rw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urungano Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        .banner { background-image: url('banner-image.png'); background-size: cover; background-position: center; height: 520px; position: relative; }
        .banner-overlay { background: linear-gradient(to bottom, rgba(0,0,0,0.4), rgba(0,0,0,0.7)); position: absolute; inset: 0; }
        .logo-img { width: 72px; height: 72px; object-fit: cover; border-radius: 18px; box-shadow: 0 4px 15px rgba(0,0,0,0.25); }
        .voice-btn.listening { background-color: #ef4444; color: white; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.1); } }
    </style>
</head>
<body class="bg-slate-50" data-lang="rw">

    <!-- Your banner and navigation (same as before) -->
    <!-- ... (keep the banner, logo, language switcher, and nav buttons as in the previous version) ... -->

    <!-- Main Chat Section -->
    <div class="max-w-6xl mx-auto px-6 py-12">
        <div class="bg-white rounded-3xl shadow-2xl overflow-hidden" style="height: 78vh; min-height: 680px;">
            <div class="bg-blue-600 px-8 py-6 text-white flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <img src="urungano-logo.jpeg" alt="Urungano Logo" class="w-14 h-14 object-cover rounded-2xl">
                    <div>
                        <h2 id="chat-title" class="text-2xl font-bold" data-en="Urungano AI Assistant" data-rw="Urungano AI Assistant">Urungano AI Assistant</h2>
                        <p id="chat-subtitle" class="text-blue-100" data-en="Anonymous • Secure • Real-time Support" data-rw="Anonymous • Secure • Real-time Support">Anonymous • Secure • Real-time Support</p>
                    </div>
                </div>

                <!-- Voice Button -->
                <button onclick="toggleVoice()" id="voiceBtn"
                        class="voice-btn bg-white text-blue-600 hover:bg-blue-100 px-6 py-3 rounded-2xl font-medium flex items-center gap-2">
                    <span id="micIcon">🎤</span>
                    <span id="voiceText" data-en="Speak" data-rw="Vuga">Vuga</span>
                </button>
            </div>

            <!-- Udify Chatbot -->
            <div style="height: calc(100% - 85px);">
                <iframe id="chatFrame"
                    src="https://udify.app/chat/4c3chgpwFrrgfL4d"
                    style="width: 100%; height: 100%;"
                    frameborder="0"
                    allow="microphone">
                </iframe>
            </div>
        </div>
    </div>

    <script>
        let recognition = null;
        let isListening = false;

        function toggleVoice() {
            if (!('SpeechRecognition' in window || 'webkitSpeechRecognition' in window)) {
                alert("Speech recognition not supported. Please use Chrome or Edge.");
                return;
            }

            if (!recognition) {
                recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
                recognition.lang = document.body.getAttribute('data-lang') === 'rw' ? 'rw-RW' : 'en-US';
                recognition.interimResults = false;

                recognition.onresult = (event) => {
                    const spoken = event.results[0][0].transcript;
                    console.log("You said:", spoken);
                    
                    // Send to Udify chatbot (best effort)
                    try {
                        const iframe = document.getElementById('chatFrame');
                        // This is limited due to cross-origin, but we log it and speak confirmation
                        console.log("Sending to chatbot:", spoken);
                    } catch(e) {}

                    // Speak a short confirmation
                    speak("Murakoze. Ndumva. " + spoken);
                };

                recognition.onerror = stopListening;
                recognition.onend = stopListening;
            }

            if (isListening) {
                stopListening();
            } else {
                startListening();
            }
        }

        function startListening() {
            isListening = true;
            document.getElementById('voiceBtn').classList.add('listening');
            document.getElementById('voiceText').textContent = document.body.getAttribute('data-lang') === 'rw' ? 'Umva...' : 'Listening...';
            recognition.start();
        }

        function stopListening() {
            isListening = false;
            document.getElementById('voiceBtn').classList.remove('listening');
            document.getElementById('voiceText').textContent = document.body.getAttribute('data-lang') === 'rw' ? 'Vuga' : 'Speak';
            if (recognition) recognition.stop();
        }

        function speak(text) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = document.body.getAttribute('data-lang') === 'rw' ? 'rw-RW' : 'en-US';
                utterance.rate = 0.95;
                window.speechSynthesis.speak(utterance);
            }
        }

        // Language Switcher (same as before)
        function switchLanguage(lang) {
            document.documentElement.setAttribute('lang', lang);
            document.body.setAttribute('data-lang', lang);

            document.querySelectorAll('[data-en]').forEach(el => {
                el.textContent = (lang === 'en') ? el.getAttribute('data-en') : el.getAttribute('data-rw');
            });

            document.getElementById('btn-rw').classList.toggle('active', lang === 'rw');
            document.getElementById('btn-en').classList.toggle('active', lang === 'en');
        }

        window.onload = () => switchLanguage('rw');
    </script>
</body>
</html>
