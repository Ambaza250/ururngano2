<!DOCTYPE html>
<html lang="rw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urungano Platform - Inclusive Support</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        .banner {
            background-image: url('banner-image.png');
            background-size: cover;
            background-position: center;
            height: 520px;
            position: relative;
        }
        .banner-overlay {
            background: linear-gradient(to bottom, rgba(0,0,0,0.35), rgba(0,0,0,0.65));
            position: absolute;
            inset: 0;
        }
        .logo-img {
            width: 72px;
            height: 72px;
            object-fit: cover;
            border-radius: 18px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.25);
        }
    </style>
</head>
<body class="bg-slate-50">

    <!-- Full-Size Banner -->
    <div class="banner">
        <div class="banner-overlay"></div>
        
        <nav class="flex justify-between items-center px-8 py-6 relative z-50">
            <!-- Logo -->
            <img src="urungano-logo.jpeg" 
                 alt="Urungano Logo" 
                 class="logo-img">

            <!-- Header Buttons -->
            <div class="flex gap-4">
                <a href="srh.html" 
                   class="bg-white/95 hover:bg-white text-slate-900 font-semibold px-7 py-3 rounded-2xl transition shadow-md">
                    SRH Services
                </a>
                <a href="mental-health.html" 
                   class="bg-white/95 hover:bg-white text-slate-900 font-semibold px-7 py-3 rounded-2xl transition shadow-md">
                    Ubuzima bwo mu Mutwe
                </a>
                <a href="about-us.html" 
                   class="bg-white/95 hover:bg-white text-slate-900 font-semibold px-7 py-3 rounded-2xl transition shadow-md">
                    About Us
                </a>
            </div>
        </nav>

        <!-- Welcome Text -->
        <div class="absolute bottom-16 left-1/2 -translate-x-1/2 text-center text-white px-6 max-w-4xl">
            <h1 class="text-6xl font-bold leading-tight mb-6">
                Welcome to Urungano Platform
            </h1>
            <p class="text-2xl text-white/90 max-w-3xl mx-auto">
                Your inclusive, Kinyarwanda-native home for stigma-free support<br>
                in Sexual and Reproductive Health (SRH) and Mental Health.
            </p>
        </div>
    </div>

    <!-- Main Chat Section -->
    <div class="max-w-6xl mx-auto px-6 py-10">
        <div class="bg-white rounded-3xl shadow-2xl overflow-hidden" style="height: 78vh; min-height: 680px;">
            <div class="bg-blue-600 px-8 py-6 text-white flex items-center gap-4">
                <img src="urungano-logo.jpeg" 
                     alt="Urungano Logo" 
                     class="w-14 h-14 object-cover rounded-2xl">
                <div>
                    <h2 class="text-2xl font-bold">Urungano AI Assistant</h2>
                    <p class="text-blue-100">Ni Ibanga• Irizewe • Ubufasha Buhoraho</p>
                </div>
            </div>

            <div style="height: calc(100% - 85px);">
                <iframe
                    src="https://udify.app/chat/4c3chgpwFrrgfL4d"
                    style="width: 100%; height: 100%;"
                    frameborder="0"
                    allow="microphone">
                </iframe>
            </div>
        </div>
    </div>

   

    <script>
        function toggleContrast() { document.body.classList.toggle('high-contrast'); }
        let currentSize = 16;
        function changeFontSize(delta) {
            currentSize += delta;
            document.body.style.fontSize = currentSize + 'px';
        }
    </script>
</body>
</html>
